# Cloudflare Worker 配置
# the-star-way Worker API
# 部署前需执行：wrangler d1 create starway-db 并替换下面的 database_id

name = "the-star-way-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 自定义域名配置
# 前后端分域名架构：
#   - starway.patdelphi.xyz → Cloudflare Pages（前端页面）
#   - api.patdelphi.xyz → Worker（API 服务）
# 历史说明：
#   之前 starway.patdelphi.xyz 同时绑定 Pages 和 Worker，导致 Pages 拦截所有请求（含 /api/*），
#   Worker 完全不被触发。改为分域名后，Pages 只服务前端静态资源，Worker 独占 api.* 域名。
# 本地 wrangler 已有 workers_routes (write) 权限，可本地部署应用 custom_domain；
# CI token 缺少此权限，push 触发的 CI 部署会跳过 routes（已存在绑定不受影响）。
routes = [
  { pattern = "api.patdelphi.xyz", custom_domain = true }
]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "starway-db"
database_id = "d338ce4b-12cd-46b0-b669-2e33b28212f0"

# Worker secrets（通过 wrangler secret put 写入，不在此明文配置）
# - STARWAY_GITHUB_TOKEN: GitHub Token
# - STARWAY_AI_BASE_URL: AI API base URL（第二阶段）
# - STARWAY_AI_API_KEY: AI API key（第二阶段）
# - STARWAY_AI_MODEL: AI 模型名（第二阶段）

# 环境变量（非敏感）
[vars]
# 前端 Pages URL，用于 Worker 根路径 / 重定向
STARWAY_FRONTEND_URL = "https://the-star-way.pages.dev/"

# 开发环境配置
[env.development]
name = "the-star-way-api-dev"

# 生产环境配置
[env.production]
name = "the-star-way-api"
