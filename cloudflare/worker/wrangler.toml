# Cloudflare Worker 配置
# the-star-way Worker API
# 部署前需执行：wrangler d1 create starway-db 并替换下面的 database_id

name = "the-star-way-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 自定义域名配置（前后端分域名架构）
#   - starway.patdelphi.xyz → Cloudflare Pages（前端页面）
#   - api.patdelphi.xyz → Worker（API 服务）
# 历史说明：
#   之前 starway.patdelphi.xyz 同时绑定 Pages 和 Worker，导致 Pages 拦截所有请求（含 /api/*），
#   Worker 完全不被触发，前端白屏。改为分域名后，Pages 只服务前端静态资源，Worker 独占 api.* 域名。
# 部署方式：
#   - custom_domain 绑定是一次性操作，已通过本地 `wrangler deploy` 完成（本地 token 有 workers_routes:write 权限）
#   - CI token 缺少 Zone:Workers Routes:Edit 权限，因此不在此配置 routes，避免 CI 部署失败
#   - 移除 routes 配置后，CI 的 `wrangler deploy` 只更新 Worker 代码，不影响已存在的 custom_domain 绑定
#   - 如需 CI 自动管理 custom_domain，需在 Cloudflare Dashboard 重新生成 API Token 并添加权限：
#       Zone > Workers Routes > Edit
# routes = [
#   { pattern = "api.patdelphi.xyz", custom_domain = true }
# ]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "starway-db"
database_id = "d338ce4b-12cd-46b0-b669-2e33b28212f0"

# Worker secrets（通过 wrangler secret put 写入，不在此明文配置）
# - STARWAY_GITHUB_TOKEN: GitHub Token
# - STARWAY_AI_BASE_URL: AI API base URL（第二阶段）
# - STARWAY_AI_API_KEY: AI API key（第二阶段）
# - STARWAY_AI_MODEL: AI 模型名（第二阶段）

# 环境变量（非敏感）
[vars]
# 前端 Pages URL，用于 Worker 根路径 / 重定向
STARWAY_FRONTEND_URL = "https://the-star-way.pages.dev/"

# 说明：原 [env.development] / [env.production] 配置已移除。
# wrangler 的 env 块不继承顶层 d1_databases / vars，导致 `wrangler deploy --env production`
# 部署的 Worker 丢失 DB 绑定（"No bindings found"）。
# CI 与本地均使用 `wrangler deploy`（不带 --env），直接采用顶层配置，name="the-star-way-api"。
