# Cloudflare Worker 配置
# the-star-way Worker API
# 部署前需执行：wrangler d1 create starway-db 并替换下面的 database_id

name = "the-star-way-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 自定义域名 starway.patdelphi.xyz 通过 Cloudflare Dashboard 手动绑定
# 不在 wrangler.toml 配置 routes，原因：
# 1. CI 使用的 API Token 缺少 Zone: Workers Routes: Edit 权限
# 2. custom_domain 绑定是一次性操作，绑定后无需 CI 重复管理
# 3. 移除 routes 配置后，wrangler deploy 只更新 Worker code，不影响已有绑定
# 如需 CI 自动管理 custom_domain，需在 Cloudflare Dashboard 重新生成 token 并添加权限：
#   Zone > Workers Routes > Edit

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "starway-db"
database_id = "d338ce4b-12cd-46b0-b669-2e33b28212f0"

# Worker secrets（通过 wrangler secret put 写入，不在此明文配置）
# - STARWAY_GITHUB_TOKEN: GitHub Token
# - STARWAY_AI_BASE_URL: AI API base URL（第二阶段）
# - STARWAY_AI_API_KEY: AI API key（第二阶段）
# - STARWAY_AI_MODEL: AI 模型名（第二阶段）

# 环境变量（非敏感）
[vars]
# 可在此配置非敏感变量

# 开发环境配置
[env.development]
name = "the-star-way-api-dev"

# 生产环境配置
[env.production]
name = "the-star-way-api"
